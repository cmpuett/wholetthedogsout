<!DOCTYPE html>
<html>
<head>
  <title>Dog Status</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="font-family:sans-serif; text-align:center; padding:40px;">

  <h1>🐕 Dog Yard Status</h1>

  <h2>Casey: <span id="casey">...</span></h2>
  <button onclick="toggle('casey')">Toggle Casey</button>

  <h2>Dad: <span id="dad">...</span></h2>
  <button onclick="toggle('dad')">Toggle Dad</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

   const firebaseConfig = {
  apiKey: "AIzaSyBXtDPdUxfp2ccQbCLwj_xYRqqQymb53FM",
  authDomain: "who-let-the-dogs-out-e69c5.firebaseapp.com",
  databaseURL: "https://who-let-the-dogs-out-e69c5-default-rtdb.firebaseio.com",
  projectId: "who-let-the-dogs-out-e69c5",
  storageBucket: "who-let-the-dogs-out-e69c5.firebasestorage.app",
  messagingSenderId: "667727438991",
  appId: "1:667727438991:web:d128dcf72e2102ca1c7cfa",
  measurementId: "G-BJSN6RWMN9"
};

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const statusRef = ref(db, "status");

    onValue(statusRef, (snapshot) => {
      const data = snapshot.val();
      document.getElementById("casey").textContent = data.casey;
      document.getElementById("dad").textContent = data.dad;
    });

    window.toggle = (person) => {
      onValue(statusRef, (snapshot) => {
        const data = snapshot.val();
        const newStatus = data[person] === "inside" ? "outside" : "inside";

        set(ref(db, "status/" + person), newStatus);
      }, { onlyOnce: true });
    };
  </script>

</body>
</html>
